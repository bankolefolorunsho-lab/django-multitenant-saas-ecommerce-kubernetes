kind: Deployment
apiVersion: apps/v1
metadata:
  name: prodxcloud-django-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prodxcloud-django-web
  template:
    metadata:
      labels:
        app: prodxcloud-django-web
    spec:
      containers:
      - name: prodxcloud-django-web
        image: bankybanks/prodxcloud-django-web:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            python manage.py makemigrations
            python manage.py migrate
            python manage.py runserver 0.0.0.0:8585
        resources:
          limits:
            memory: 400Mi
          requests:
            cpu: 100m
            memory: 200Mi
        ports:
        - containerPort: 8585
---
apiVersion: v1
kind: Service
metadata:
  name: load-balancer
  labels:
    app: prodxcloud-django-web
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8585
    protocol: TCP
  selector:
    app: prodxcloud-django-web
